<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Small Multiples State Tile Cartograms</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @font-face { font-family: "Benton"; src: url("Benton Sans/Benton Sans Book.otf"); }
  @font-face { font-family: "BentonStrong"; src: url("Benton Sans/Benton Sans Bold.otf"); }
  @font-face { font-family: "BentonMedium"; src: url("Benton Sans/Benton Sans Medium.otf"); }

  * { box-sizing: border-box; }

  body{
    margin: 0;
    padding: 16px;
    background: #fff;
    color: #111;
    font-family: "Benton", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  }

  #wrapper{
    width: 100%;
    max-width: 1500px;
    margin: 0 auto;
  }

  #title{
    font-family: "BentonStrong", system-ui, sans-serif;
    font-size: clamp(20px, 3vw, 26px);
    padding: 10px 0;
    border-top: 3px solid black;
    margin-bottom: 12px;
  }

  #subtitle{
    font-size: 14px;
    line-height: 1.35;
    color: #444;
    margin-bottom: 18px;
  }

  .grid{
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    align-items: start;
  }

  .card{
    padding: 10px;
    background: #fff;
    min-width: 0;
  }

  .mapTitle{
    font-family: "BentonStrong", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.2;
    margin: 0 0 4px 0;
  }

  .mapKey{
    font-family: "BentonMedium", system-ui, sans-serif;
    font-size: 11px;
    line-height: 1.2;
    color: #666;
    margin: 0 0 8px 0;
  }

  .mapHost{
    width: 100%;
  }

  svg{
    display: block;
    width: 100%;
    height: auto;
    max-width: 100%;
  }

  .state text{
    text-anchor: middle;
    user-select: none;
    pointer-events: none;
  }

  .abbr{
    font-family: "BentonStrong", system-ui, sans-serif;
    font-size: 9px;
    letter-spacing: 0.2px;
  }

  .valueLabel{
    font-family: "Benton", system-ui, sans-serif;
    font-size: 8px;
    letter-spacing: 0.1px;
  }

  .legendWrap{
    margin-top: 8px;
  }

  .legendTitle{
    font-family: "BentonMedium", system-ui, sans-serif;
    font-size: 11px;
    color: #555;
    margin-bottom: 4px;
  }

  .legendRow{
    display: flex;
    flex-wrap: wrap;
    gap: 6px 8px;
    align-items: center;
  }

  .legendItem{
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: #555;
    line-height: 1.1;
  }

  .legendSwatch{
    width: 12px;
    height: 12px;
    border: 1px solid rgba(0,0,0,.15);
    flex: 0 0 12px;
  }

  .tooltip{
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    background: rgba(255,255,255,.98);
    border: 1px solid rgba(0,0,0,.15);
    box-shadow: 0 4px 18px rgba(0,0,0,.12);
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.35;
    max-width: 380px;
    max-height: 70vh;
    overflow: auto;
    opacity: 0;
  }

  .tooltip-title{
    font-family: "BentonStrong", system-ui, sans-serif;
    font-size: 13px;
    margin-bottom: 4px;
  }

  .tooltip-sub{
    color: #444;
    margin-bottom: 8px;
  }

  .tooltip-list{
    display: grid;
    gap: 8px;
  }

  .tooltip-item{
    border-top: 1px solid #e3e3e3;
    padding-top: 7px;
  }

  .tooltip-year{
    font-family: "BentonStrong", system-ui, sans-serif;
    margin-bottom: 2px;
  }

  .tooltip-desc{
    margin-bottom: 2px;
  }

  .tooltip-notes{
    color: #555;
  }

  @media (max-width: 1200px){
    .grid{
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 900px){
    .grid{
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 700px){
    body{ padding: 10px; }
    .grid{ gap: 10px; }
    .card{ padding: 6px; }
  }
</style>
</head>

<body>
<div id="wrapper">
  <div id="title">State Constitution Amendments</div>
  <div id="subtitle">
    count based on existence of key words in amandment
  </div>
  <div id="app"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script id="grid" type="text/plain">
                              ME
               WI          VT NH
WA ID MT ND MN IL MI    NY MA
OR NV WY SD IA IN OH PA NJ CT RI
CA UT CO NE MO KY WV VA MD DE
   AZ NM KS AR TN NC SC
         OK LA MS AL GA
HI AK    TX             FL
</script>

<script>
    const STATE_NAMES = {
  AL: "Alabama", AK: "Alaska", AZ: "Arizona", AR: "Arkansas",
  CA: "California", CO: "Colorado", CT: "Connecticut",
  DE: "Delaware", DC: "District of Columbia",
  FL: "Florida", GA: "Georgia", HI: "Hawaii",
  ID: "Idaho", IL: "Illinois", IN: "Indiana", IA: "Iowa",
  KS: "Kansas", KY: "Kentucky", LA: "Louisiana",
  ME: "Maine", MD: "Maryland", MA: "Massachusetts",
  MI: "Michigan", MN: "Minnesota", MS: "Mississippi",
  MO: "Missouri", MT: "Montana", NE: "Nebraska",
  NV: "Nevada", NH: "New Hampshire", NJ: "New Jersey",
  NM: "New Mexico", NY: "New York",
  NC: "North Carolina", ND: "North Dakota",
  OH: "Ohio", OK: "Oklahoma", OR: "Oregon",
  PA: "Pennsylvania", RI: "Rhode Island",
  SC: "South Carolina", SD: "South Dakota",
  TN: "Tennessee", TX: "Texas",
  UT: "Utah", VT: "Vermont", VA: "Virginia",
  WA: "Washington", WV: "West Virginia",
  WI: "Wisconsin", WY: "Wyoming"
};
const CONFIG = {
  CSV_PATH: "BOS Amendment Data 2005-2024 BCJ 1.2.1.csv",
  STATE_COL: "state",
  YEAR_COL: "year",
  DESCRIPTION_COL: "description",
  NOTES_COL: "text_notes",

  DRAW_COLUMNS: [
    "v9","v10","v12","v13","v14","v15","v11",
    "v16","v17","v18","v19","v20","v21","v22","v23"
  ],

  LABELS: {
    v9:  'Civil rights contains ("right", "domain", "affirmative", "ethnicity", "race")',
    v10: 'Criminal law contains ("marijuana", "crime", "criminal")',
    v11: 'Criminal procedure contains ("bail", "felon", "jury", "trial", "bond")',
    v12: 'Economic and labor rights contains ("work", "wage", "union", "collective")',
    v13: 'Education contains ("education", "school", "college", "university")',
    v14: 'Environment contains ("energy", "conservation", "forest", "natural", "parks", "renewable", "resources", "lands")',
    v15: 'Government structure contains ("legislature", "legislative", "legislator", "senate", "term", "retire", "salary", "commission", "governor", "gubernatorial", "executive", "board", "judicial", "judges", "court", "office", "official", "government")',
    v16: 'Gun rights contains ("gun", "arms")',
    v17: 'Judicial selection and administration contains ("court", "judicial", "judge")',
    v18: 'Reproductive rights contains ("abortion", "parental")',
    v19: 'Speech and religion contains ("speech", "expression", "religion", "exercise", "establishment")',
    v20: 'Torts and liability contains ("tort", "liab")',
    v21: 'Voting rights and elections contains ("voting", "election", "district", "campaign", "voter", "ID", "primaries", "primary", "absentee", "regist")',
    v22: 'Redistricting contains ("redistrict")',
    v23: 'LGBTQ+ contains ("sex", "marriage", "SSM")'
  },

  tileSize: 26,
  tileGapFactor: 1.18,
  cornerRadius: 0,
  stroke: "rgba(0,0,0,.16)",
  strokeWidth: 1,

  ZERO_COLOR: "#EBEAE9",
   SCALE_BREAKS: [1, 5, 10, 20,30],
  SCALE_COLORS: ["#C3DEEB","#6CBAD6", "#3995B2","#007194","#00415B"],


  SHOW_ZERO_TEXT: true,
  MAX_TOOLTIP_ITEMS: 200
};

function parseStateGridText(gridText){
  const states = [];
  gridText.split("\n").forEach((line, i) => {
    const re = /\w+/g;
    let m;
    while ((m = re.exec(line))) {
      states.push({ name: m[0], x: m.index / 3, y: i });
    }
  });
  return states;
}

const GRID_STATES = parseStateGridText(document.getElementById("grid").textContent);
const tooltip = d3.select("#tooltip");

function clampInt(n, min, max){
  n = Math.round(Number(n));
  if (!Number.isFinite(n)) n = min;
  return Math.max(min, Math.min(max, n));
}

function cleanAbbr(s){
  return String(s || "").trim().toUpperCase();
}

function formatValue(v){
  return d3.format(",")(v);
}

function isOne(v){
  return String(v).trim() === "1";
}

function getThresholdScale(breaks, colors){
  if (colors.length !== breaks.length) {
    throw new Error("SCALE_BREAKS and SCALE_COLORS must have the same length.");
  }
  return d3.scaleThreshold()
    .domain(breaks.slice(1))
    .range(colors);
}

function getFillColor(value, scale){
  if (!Number.isFinite(value) || value <= 0) return CONFIG.ZERO_COLOR;
  return scale(value);
}

function getTextColor(fill){
  const c = d3.color(fill);
  if (!c) return "#111";
  const luminance = (0.2126 * c.r + 0.7152 * c.g + 0.0722 * c.b) / 255;
  return luminance < 0.55 ? "#fff" : "#111";
}

function buildLegendItems(localMax){
  const items = [{ color: CONFIG.ZERO_COLOR, label: "0" }];

  if (!Number.isFinite(localMax) || localMax <= 0) return items;

  for (let i = 0; i < CONFIG.SCALE_BREAKS.length; i++) {
    const start = CONFIG.SCALE_BREAKS[i];
    if (start > localMax) break;

    const nextStart = CONFIG.SCALE_BREAKS[i + 1];
    const end = nextStart ? Math.min(nextStart - 1, localMax) : localMax;
    const label = end <= start ? `${start}` : `${start}–${end}`;

    items.push({
      color: CONFIG.SCALE_COLORS[i],
      label
    });
  }

  return items;
}

function renderLegend(host, localMax){
  const items = buildLegendItems(localMax);

  const legend = d3.select(host)
    .append("div")
    .attr("class", "legendWrap");

  legend.append("div")
    .attr("class", "legendTitle")
    .text("Legend");

  const row = legend.append("div")
    .attr("class", "legendRow");

  row.selectAll(".legendItem")
    .data(items)
    .enter()
    .append("div")
    .attr("class", "legendItem")
    .html(d => `<span class="legendSwatch" style="background:${d.color}"></span><span>${d.label}</span>`);
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function showTooltip(event, stateAbbr, column, bundle){
  const count = bundle ? bundle.count : 0;
  const records = bundle ? bundle.records.slice(0, CONFIG.MAX_TOOLTIP_ITEMS) : [];

  const fullName = STATE_NAMES[stateAbbr] || stateAbbr;

let html = `
  <div class="tooltip-title">${escapeHtml(fullName)} (${escapeHtml(stateAbbr)}) — ${escapeHtml(column)}</div>
  <div class="tooltip-sub"><strong>${formatValue(count)}</strong> matching record${count === 1 ? "" : "s"}</div>
`;

  if (records.length > 0) {
    html += `<div class="tooltip-list">`;
    records.forEach(r => {
      html += `
        <div class="tooltip-item">
          <div class="tooltip-year">${escapeHtml(r.year)}</div>
          <div class="tooltip-desc">${escapeHtml(r.description)}</div>
          <div class="tooltip-notes">${escapeHtml(r.text_notes)}</div>
        </div>
      `;
    });
    html += `</div>`;

    if (bundle.records.length > CONFIG.MAX_TOOLTIP_ITEMS) {
      html += `<div class="tooltip-sub" style="margin-top:8px;">Showing first ${CONFIG.MAX_TOOLTIP_ITEMS} records.</div>`;
    }
  }

  tooltip
    .style("opacity", 1)
    .html(html)
    .style("left", `${event.clientX + 12}px`)
    .style("top", `${event.clientY + 12}px`);
}

function moveTooltip(event){
  tooltip
    .style("left", `${event.clientX + 12}px`)
    .style("top", `${event.clientY + 12}px`);
}

function hideTooltip(){
  tooltip.style("opacity", 0);
}

function aggregateRawRows(rawRows){
  const grouped = new Map();

  rawRows.forEach(row => {
    const state = cleanAbbr(row[CONFIG.STATE_COL]);
    if (!state) return;

    CONFIG.DRAW_COLUMNS.forEach(column => {
      if (!isOne(row[column])) return;

      const key = `${state}|||${column}`;
      if (!grouped.has(key)) {
        grouped.set(key, {
          state,
          column,
          count: 0,
          records: []
        });
      }

      const bundle = grouped.get(key);
      bundle.count += 1;
      bundle.records.push({
        year: row[CONFIG.YEAR_COL] ?? "",
        description: row[CONFIG.DESCRIPTION_COL] ?? "",
        text_notes: row[CONFIG.NOTES_COL] ?? ""
      });
    });
  });

  return grouped;
}

function build(aggregated){
  const app = d3.select("#app").html("");

  const grid = app.append("div")
    .attr("class", "grid");

  const scale = getThresholdScale(CONFIG.SCALE_BREAKS, CONFIG.SCALE_COLORS);

  const cardData = CONFIG.DRAW_COLUMNS.map(column => {
    const localValues = GRID_STATES.map(s => {
      const bundle = aggregated.get(`${s.name}|||${column}`);
      return bundle ? bundle.count : 0;
    });

    return {
      column,
      localMax: d3.max(localValues) || 0
    };
  });

  const cards = grid.selectAll(".card")
    .data(cardData)
    .enter()
    .append("div")
    .attr("class", "card");

  cards.append("div")
    .attr("class", "mapTitle")
    .text(d => CONFIG.LABELS[d.column] || d.column);

  cards.append("div")
    .attr("class", "mapKey")
    .text(d => d.column);

  cards.append("div")
    .attr("class", "mapHost")
    .each(function(d){
      drawMap(this, aggregated, d.column, d.localMax, scale);
    });

  cards.each(function(d){
    renderLegend(this, d.localMax);
  });
}

function drawMap(hostEl, aggregated, column, localMax, scale){
  const tileSize = clampInt(CONFIG.tileSize, 18, 60);
  const cellSize = Math.round(tileSize * (Number(CONFIG.tileGapFactor) || 1.18));
  const tileW = tileSize;
  const tileH = tileSize;

  const gridWidth = d3.max(GRID_STATES, d => d.x) + 1;
  const gridHeight = d3.max(GRID_STATES, d => d.y) + 1;

  const w = Math.round(gridWidth * cellSize + cellSize);
  const h = Math.round(gridHeight * cellSize + cellSize);

  const svg = d3.select(hostEl)
    .append("svg")
    .attr("viewBox", `0 0 ${w} ${h}`);

  const g = svg.append("g")
    .attr("transform", `translate(${w / 2},${h / 2})`);

  const state = g.selectAll(".state")
    .data(GRID_STATES)
    .enter()
    .append("g")
    .attr("class", "state")
    .attr("transform", d =>
      `translate(${(d.x - gridWidth / 2) * cellSize}, ${(d.y - gridHeight / 2) * cellSize})`
    );

  state.each(function(d){
    const key = `${d.name}|||${column}`;
    const bundle = aggregated.get(key);
    const value = bundle ? bundle.count : 0;
    const fill = getFillColor(value, scale);
    const textColor = getTextColor(fill);

    const s = d3.select(this);
    s.style("cursor", value > 0 ? "pointer" : "default");

    s.append("rect")
      .attr("x", -tileW / 2)
      .attr("y", -tileH / 2)
      .attr("width", tileW)
      .attr("height", tileH)
      .attr("rx", CONFIG.cornerRadius)
      .attr("ry", CONFIG.cornerRadius)
      .attr("stroke", CONFIG.stroke)
      .attr("stroke-width", Number(CONFIG.strokeWidth ?? 1))
      .attr("fill", fill);

    s.append("text")
      .attr("class", "abbr")
      .attr("y", -3)
      .attr("fill", textColor)
      .text(d.name);

    s.append("text")
      .attr("class", "valueLabel")
      .attr("y", 8)
      .attr("fill", textColor)
      .text(value === 0 && !CONFIG.SHOW_ZERO_TEXT ? "" : formatValue(value));

    if (value > 0) {
  s.on("mousemove", function(event){
      showTooltip(event, d.name, column, bundle);
    })
    .on("mouseenter", function(event){
      showTooltip(event, d.name, column, bundle);
    })
    .on("mouseleave", hideTooltip);
} else {
  s.on("mousemove", null)
    .on("mouseenter", null)
    .on("mouseleave", null);
}
  });
}

async function init(){
  const raw = await d3.csv(CONFIG.CSV_PATH);
  build(aggregateRawRows(raw));
}

init();
</script>
</body>
</html>
